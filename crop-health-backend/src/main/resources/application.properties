spring.application.name=agri-ai-farmer-assistant

# H2 Database Configuration (Persistent File-based)
spring.datasource.url=jdbc:h2:file:./data/agri_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enables H2 Web Console (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Port for backend
server.port=8080

# External API Keys (Placeholders)
weather.api.key=YOUR_OPENWEATHERMAP_KEY
weather.api.url=https://api.openweathermap.org/data/2.5/weather
gov.api.key=YOUR_GOV_DATA_KEY
tts.api.key=YOUR_GOOGLE_CLOUD_TTS_KEY

